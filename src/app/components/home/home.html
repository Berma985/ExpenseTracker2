<div class="container text-center">
  <h1>Welcome to Expense Tracker</h1>
  <h3>To Get Started <a routerLink="/login">Login</a></h3>

  <div class="row">
    <div class="col-md-4">
      <div class="card btn" routerLink="/dashboard">
        <div class="card-header"><h4>Dashboard</h4></div>
        <div class="card-body">
          <h6>Overview of all expenses and income showing by category spending</h6>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card btn" routerLink="/transactions">
        <div class="card-header"><h4>Transactions</h4></div>
        <div class="card-body">
          <h6>Add and Track your Expenses/Income and organize them by Category</h6>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card btn" routerLink="/categories">
        <div class="card-header"><h4>Categories</h4></div>
        <div class="card-body">
          <h6>Manage Expense Categories like Work or Grocery and add Category Budgets</h6>
        </div>
      </div>
    </div>
  </div>
</div>
